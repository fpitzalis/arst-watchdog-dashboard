<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BadgeBox Watch — ARST</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0e12; color: #e6e6e6; padding: 20px;
}
header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
h1 { font-size: 22px; font-weight: 600; }
.controls { display: flex; gap: 12px; align-items: center; }
select, button {
    background: #1a2332; color: #e6e6e6; border: 1px solid #2a3a52;
    padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer;
}
button:hover { border-color: #4ade80; }
.refresh-info { font-size: 12px; color: #8a9aae; }

/* Summary cards */
.summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 24px;
}
.card {
    background: #1a2332; border-radius: 8px; padding: 16px;
    border: 1px solid #2a3a52; cursor: pointer; transition: border-color 0.2s, transform 0.1s;
}
.card:hover { transform: translateY(-1px); }
.card.active { border-color: #e6e6e6; border-width: 2px; }
.card .num { font-size: 28px; font-weight: 700; }
.card .lbl { font-size: 12px; color: #8a9aae; text-transform: uppercase; margin-top: 4px; }

/* Summary + chart row */
.summary-row { display: flex; gap: 20px; margin-bottom: 24px; align-items: flex-start; flex-wrap: wrap; }
.summary-cards { flex: 1; min-width: 300px; }
.chart-container { width: 180px; height: 180px; flex-shrink: 0; background: #1a2332; border-radius: 8px; border: 1px solid #2a3a52; padding: 12px; display: flex; align-items: center; justify-content: center; }
@media (max-width: 700px) { .chart-container { width: 100%; height: 200px; } }
.ok    { color: #4ade80; }
.late  { color: #facc15; }
.down  { color: #f87171; }
.bgoff { color: #fb923c; }
.never { color: #9ca3af; }

/* ECG device cards */
.section-title {
    font-size: 14px; text-transform: uppercase; color: #8a9aae;
    letter-spacing: 0.05em; margin: 32px 0 12px; font-weight: 500;
}
.device-card {
    background: #0f1419; border: 1px solid #1a2a3a;
    border-radius: 12px; margin-bottom: 14px; overflow: hidden; position: relative;
}
.device-card.status-ok    { border-left: 3px solid #4ade80; }
.device-card.status-late  { border-left: 3px solid #facc15; }
.device-card.status-down  { border-left: 3px solid #f87171; }
.device-card.status-bgoff { border-left: 3px solid #fb923c; }
.device-card.status-never { border-left: 3px solid #9ca3af; }

.device-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 6px; flex-wrap: wrap; gap: 8px;
}
.device-left { display: flex; align-items: center; gap: 12px; }
.pulse-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; position: relative;
}
.pulse-dot::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    animation: pulse-ring 2s ease-out infinite;
}
.pulse-dot.ok    { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
.pulse-dot.ok::after    { border: 2px solid #4ade80; }
.pulse-dot.late  { background: #facc15; box-shadow: 0 0 8px #facc15; }
.pulse-dot.late::after  { border: 2px solid #facc15; }
.pulse-dot.down  { background: #f87171; box-shadow: 0 0 8px #f87171; }
.pulse-dot.down::after  { border: 2px solid #f87171; animation: none; }
.pulse-dot.bgoff { background: #fb923c; box-shadow: 0 0 8px #fb923c; }
.pulse-dot.bgoff::after { border: 2px solid #fb923c; }
.pulse-dot.never { background: #9ca3af; }
.pulse-dot.never::after { border: 2px solid #9ca3af; animation: none; }

@keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
}

.device-name { font-size: 15px; font-weight: 600; }
.device-sub { font-size: 11px; color: #8a9aae; }
.device-stats { display: flex; gap: 16px; font-size: 12px; color: #8a9aae; }
.device-stats .val { color: #e6e6e6; font-weight: 600; }
.device-stats .low { color: #f87171; }

.ecg-container {
    width: 100%; height: 60px; position: relative;
    background: linear-gradient(180deg, rgba(10,14,18,0) 0%, rgba(10,14,18,0.8) 100%);
}
.ecg-grid {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(42,58,82,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,58,82,0.12) 1px, transparent 1px);
    background-size: 20px 20px;
}
.ecg-canvas { width: 100%; height: 100%; display: block; }
.bpm-display {
    position: absolute; top: 6px; right: 14px;
    font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums;
    text-shadow: 0 0 16px currentColor;
}
.bpm-label { font-size: 9px; color: #8a9aae; font-weight: 400; text-shadow: none; }

/* Alerts */
.alert-row { display: flex; gap: 12px; padding: 10px 14px;
             border-bottom: 1px solid #2a3a52; font-size: 13px; align-items: baseline; }
.alert-row:last-child { border-bottom: 0; }
.alert-time { color: #8a9aae; min-width: 130px; font-variant-numeric: tabular-nums; }
.alert-kind { min-width: 90px; font-weight: 600; font-size: 11px;
              text-transform: uppercase; letter-spacing: 0.04em; }
.muted { color: #6b7a8c; font-size: 12px; }
</style>
</head>
<body>

<header>
    <h1>BadgeBox Watch Dog</h1>
    <div class="controls">
        <select id="filterSede"><option value="">Tutte le sedi</option></select>
        <button id="refresh">Aggiorna</button>
        <span class="refresh-info" id="refreshInfo"></span>
    </div>
</header>

<div class="summary-row">
    <div class="summary" id="summary"></div>
    <div class="chart-container"><canvas id="pieChart"></canvas></div>
</div>

<div class="section-title">Dispositivi</div>
<div id="devicesContainer"></div>

<div class="section-title">Alert ultimi 7 giorni</div>
<div id="alertsContainer" style="background: #1a2332; border-radius: 8px; overflow: hidden; border: 1px solid #2a3a52;"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL  = "https://gfqufujsprfgtcqafkux.supabase.co";
const SUPABASE_KEY  = "sb_publishable_IUKjmO4xMxuj0cuHn7HWIA_Rfz4vcM7";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const STATUS_LABELS = {
    ok: "OK", late: "In ritardo", down: "DOWN",
    badgebox_off: "BadgeBox off", never: "Mai visto",
};
const STATUS_COLORS = {
    ok: "#4ade80", late: "#facc15", down: "#f87171",
    badgebox_off: "#fb923c", never: "#9ca3af",
};

function fmtAgo(seconds) {
    if (seconds == null) return "—";
    if (seconds < 60) return `${seconds}s fa`;
    if (seconds < 3600) return `${Math.floor(seconds / 60)} min fa`;
    if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m fa`;
    return `${Math.floor(seconds / 86400)}g fa`;
}

function fmtDate(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleString("it-IT", { dateStyle: "short", timeStyle: "medium" });
}

async function loadDevices(filterSede) {
    let q = sb.from("devices_status").select("*").order("sede").order("descrizione");
    if (filterSede) q = q.eq("sede", filterSede);
    const { data, error } = await q;
    if (error) { console.error(error); return []; }
    return data ?? [];
}

async function loadAlerts() {
    const since = new Date(Date.now() - 7 * 86400 * 1000).toISOString();
    const { data, error } = await sb
        .from("alerts")
        .select("*, devices(sede, descrizione)")
        .gte("sent_at", since)
        .order("sent_at", { ascending: false })
        .limit(200);
    if (error) { console.error(error); return []; }
    return data ?? [];
}

async function loadSedi() {
    const { data } = await sb.from("devices").select("sede");
    const sedi = [...new Set((data ?? []).map(d => d.sede))].sort();
    const sel = document.getElementById("filterSede");
    const cur = sel.value;
    sel.innerHTML = '<option value="">Tutte le sedi</option>' +
        sedi.map(s => `<option ${s === cur ? "selected" : ""}>${s}</option>`).join("");
}

let filterStatus = null;  // null = tutti
let allDevices = [];
let pieChart = null;

function renderSummary(devices) {
    allDevices = devices;
    const counts = { ok: 0, late: 0, down: 0, badgebox_off: 0, never: 0 };
    devices.forEach(d => counts[d.status]++);

    const cards = [
        { key: null,            num: devices.length, cls: "",     label: "Totali" },
        { key: "ok",            num: counts.ok,      cls: "ok",   label: "OK" },
        { key: "late",          num: counts.late,     cls: "late", label: "In ritardo" },
        { key: "badgebox_off",  num: counts.badgebox_off, cls: "bgoff", label: "BadgeBox off" },
        { key: "down",          num: counts.down,     cls: "down", label: "Down" },
        { key: "never",         num: counts.never,    cls: "never", label: "Mai visti" },
    ];

    document.getElementById("summary").innerHTML = cards.map(c => {
        const active = filterStatus === c.key ? "active" : "";
        return `<div class="card ${active}" data-filter="${c.key}"><div class="num ${c.cls}">${c.num}</div><div class="lbl">${c.label}</div></div>`;
    }).join("");

    // Click handlers
    document.querySelectorAll("#summary .card").forEach(el => {
        el.addEventListener("click", () => {
            const f = el.dataset.filter === "null" ? null : el.dataset.filter;
            filterStatus = filterStatus === f ? null : f;  // toggle
            renderSummary(allDevices);
            const filtered = filterStatus ? allDevices.filter(d => d.status === filterStatus) : allDevices;
            renderDevices(filtered);
        });
    });

    // Pie chart
    const pieData = [counts.ok, counts.late, counts.badgebox_off, counts.down, counts.never];
    const pieLabels = ["OK", "In ritardo", "BadgeBox off", "Down", "Mai visti"];
    const pieColors = ["#4ade80", "#facc15", "#fb923c", "#f87171", "#9ca3af"];

    if (pieChart) {
        pieChart.data.datasets[0].data = pieData;
        pieChart.update();
    } else {
        const ctx = document.getElementById("pieChart");
        if (ctx) {
            pieChart = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: pieLabels,
                    datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 0 }],
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: "60%",
                    plugins: {
                        legend: { display: false },
                        tooltip: { bodyFont: { size: 12 } },
                    },
                },
            });
        }
    }
}

// ===================== ECG Engine =====================

class ECGTrace {
    constructor(canvas, color, alive) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d");
        this.color = color;
        this.alive = alive;
        this.x = 0;
        this.data = [];
        this.resize();
        this._onResize = () => this.resize();
        window.addEventListener("resize", this._onResize);
    }

    destroy() {
        window.removeEventListener("resize", this._onResize);
    }

    resize() {
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.canvas.width = rect.width * devicePixelRatio;
        this.canvas.height = rect.height * devicePixelRatio;
        this.w = rect.width;
        this.h = rect.height;
        this.ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        this.data = new Array(Math.ceil(this.w)).fill(0);
        this.x = 0;
    }

    ecgBeat(t) {
        if (t < 0.10) return 0.12 * Math.sin(t / 0.10 * Math.PI);
        if (t < 0.18) return 0;
        if (t < 0.22) return -0.10 * Math.sin((t - 0.18) / 0.04 * Math.PI);
        if (t < 0.30) return 0.90 * Math.sin((t - 0.22) / 0.08 * Math.PI);
        if (t < 0.36) return -0.20 * Math.sin((t - 0.30) / 0.06 * Math.PI);
        if (t < 0.45) return 0;
        if (t < 0.60) return 0.18 * Math.sin((t - 0.45) / 0.15 * Math.PI);
        return 0;
    }

    update() {
        if (!this.alive) {
            this.data[this.x % this.w] = (Math.random() - 0.5) * 0.02;
        } else {
            const cycleLen = Math.max(80, Math.floor(this.w / 4));
            const t = (this.x % cycleLen) / cycleLen;
            this.data[this.x % this.w] = this.ecgBeat(t) + (Math.random() - 0.5) * 0.015;
        }
        this.x++;
        this.draw();
    }

    draw() {
        const { ctx, w, h, color } = this;
        const mid = h * 0.55, amp = h * 0.4;
        const headX = this.x % w;

        ctx.clearRect(0, 0, w, h);
        ctx.shadowColor = color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.8;
        ctx.lineJoin = "round";

        let started = false;
        for (let i = 0; i < w; i++) {
            const drawX = (headX + i + 20) % w;
            const gap = (w + drawX - headX) % w;
            if (gap < 20) continue;
            const y = mid - (this.data[drawX] || 0) * amp;
            if (!started) { ctx.moveTo(drawX, y); started = true; }
            else ctx.lineTo(drawX, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        const headVal = this.data[(this.x - 1) % w] || 0;
        ctx.beginPath();
        ctx.arc(headX, mid - headVal * amp, 3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

let activeTraces = [];

function renderDevices(devices) {
    // Destroy old traces
    activeTraces.forEach(t => t.destroy());
    activeTraces = [];

    const container = document.getElementById("devicesContainer");
    if (!devices.length) {
        container.innerHTML = `<div class="muted" style="padding:20px;text-align:center">Nessun dispositivo registrato</div>`;
        return;
    }

    container.innerHTML = devices.map((d, i) => {
        const dotClass = d.status === "badgebox_off" ? "bgoff" : d.status;
        const statusLabel = STATUS_LABELS[d.status];
        const color = STATUS_COLORS[d.status];
        const battClass = d.battery_pct != null && d.battery_pct < 20 ? "low" : "";
        const battStr = d.battery_pct != null ? `${d.battery_pct}%${d.battery_charging ? " ⚡" : ""}` : "—";
        const netStr = d.network_type ?? "—";
        const bbStr = d.badgebox_foreground == null ? "—" : (d.badgebox_foreground ? "foreground" : "background");
        const alive = d.status === "ok" || d.status === "late" || d.status === "badgebox_off";
        const hbPerHour = alive ? 12 : 0;

        return `
        <div class="device-card status-${dotClass}">
            <div class="device-top">
                <div class="device-left">
                    <div class="pulse-dot ${dotClass}"></div>
                    <div>
                        <div class="device-name">${d.sede} — ${d.descrizione}</div>
                        <div class="device-sub">${statusLabel} · ${fmtAgo(d.seconds_since_last)} · ${d.modello ?? ""}</div>
                    </div>
                </div>
                <div class="device-stats">
                    <span>Batteria <span class="val ${battClass}">${battStr}</span></span>
                    <span>Rete <span class="val">${netStr}</span></span>
                    <span>BadgeBox <span class="val">${bbStr}</span></span>
                </div>
            </div>
            <div class="ecg-container">
                <div class="ecg-grid"></div>
                <canvas class="ecg-canvas" id="ecg-${i}"></canvas>
                <div class="bpm-display" style="color:${color}">
                    ${hbPerHour}<span class="bpm-label"> hb/h</span>
                </div>
            </div>
        </div>`;
    }).join("");

    // Create ECG traces
    devices.forEach((d, i) => {
        const canvas = document.getElementById(`ecg-${i}`);
        if (!canvas) return;
        const color = STATUS_COLORS[d.status];
        const alive = d.status === "ok" || d.status === "late" || d.status === "badgebox_off";
        activeTraces.push(new ECGTrace(canvas, color, alive));
    });
}

function renderAlerts(alerts) {
    const c = document.getElementById("alertsContainer");
    if (!alerts.length) {
        c.innerHTML = `<div class="muted" style="padding:20px;text-align:center">Nessun alert negli ultimi 7 giorni</div>`;
        return;
    }
    const cls = { silence: "down", badgebox_off: "bgoff", recovered: "ok" };
    const icons = { silence: "🔴", badgebox_off: "🟡", recovered: "🟢" };
    const labels = { silence: "DOWN", badgebox_off: "BB off", recovered: "Recuperato" };
    c.innerHTML = alerts.map(a => `
        <div class="alert-row">
            <span class="alert-time">${fmtDate(a.sent_at)}</span>
            <span class="alert-kind ${cls[a.kind] ?? "muted"}">${icons[a.kind] ?? ""} ${labels[a.kind] ?? a.kind}</span>
            <span>${a.devices?.sede ?? "?"} — ${a.devices?.descrizione ?? "?"}</span>
            ${a.telegram_ok === false ? `<span class="down" title="${a.telegram_error}">⚠ TG fail</span>` : ""}
        </div>
    `).join("");
}

// ===================== Animation loop =====================
function animateECG() {
    activeTraces.forEach(t => t.update());
    requestAnimationFrame(animateECG);
}
animateECG();

// ===================== Data refresh =====================
async function refreshAll() {
    const filterSede = document.getElementById("filterSede").value;
    const [devices, alerts] = await Promise.all([loadDevices(filterSede), loadAlerts()]);
    await loadSedi();
    renderSummary(devices);
    const filtered = filterStatus ? devices.filter(d => d.status === filterStatus) : devices;
    renderDevices(filtered);
    renderAlerts(alerts);
    document.getElementById("refreshInfo").textContent =
        "Aggiornato " + new Date().toLocaleTimeString("it-IT");
}

document.getElementById("refresh").addEventListener("click", refreshAll);
document.getElementById("filterSede").addEventListener("change", refreshAll);

refreshAll();
setInterval(refreshAll, 30_000);
</script>
</body>
</html>
